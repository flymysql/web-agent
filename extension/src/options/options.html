<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Browser Agent · 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>AI Browser Agent 设置</h1>

      <section class="card">
        <h2>后端连接</h2>
        <label>后端 HTTP 地址
          <input id="backendUrl" type="text" placeholder="http://localhost:3847" />
        </label>
        <label>后端 WebSocket 地址
          <input id="wsUrl" type="text" placeholder="ws://localhost:3847/ws" />
        </label>
        <button id="testBtn" class="ghost">测试连接</button>
        <span id="testResult" class="hint"></span>
      </section>

      <section class="card">
        <h2>模型 (LLM)</h2>
        <p class="hint">保存到后端，覆盖服务器环境变量。</p>
        <label>Base URL
          <input id="llmBaseUrl" type="text" placeholder="https://api.openai.com/v1" />
        </label>
        <label>Model
          <input id="llmModel" type="text" placeholder="gpt-4o-mini" />
        </label>
        <label>API Key
          <input id="llmApiKey" type="password" placeholder="保持空白则不修改" />
        </label>
        <label>单次最大步数 (maxSteps)
          <input id="maxSteps" type="number" min="1" placeholder="40" />
        </label>
      </section>

      <section class="card">
        <h2>自动执行 (工作流)</h2>
        <label class="row">
          <input id="autorunEnabled" type="checkbox" />
          允许“页面加载自动执行”的工作流触发
        </label>
        <label>站点白名单（每行一个 URL 片段；留空=匹配所有站点）
          <textarea id="autorunWhitelist" rows="4" placeholder="example.com&#10;admin.internal"></textarea>
        </label>
      </section>

      <section class="card">
        <h2>语音输入</h2>
        <label class="row">
          <input id="voiceEnabled" type="checkbox" />
          启用语音转文字（对话听写 + 录制旁白，需 Chrome 与麦克风权限）
        </label>
        <label class="row">
          <input id="voiceRefine" type="checkbox" />
          对话听写后用 AI 精简并提取意图
        </label>
        <label>识别语言
          <input id="voiceLang" type="text" placeholder="zh-CN" />
        </label>
      </section>

      <section class="card">
        <h2>安全</h2>
        <label>访问令牌 (Auth Token)
          <input id="authToken" type="password" placeholder="后端设置 AGENT_AUTH_TOKEN 时填写" />
        </label>
        <label class="row">
          <input id="allowEvaluate" type="checkbox" />
          允许 agent 执行任意 JavaScript (evaluate)
        </label>
        <label class="row">
          <input id="allowPrivateNetwork" type="checkbox" />
          允许 httpRequest 访问内网/本地地址
        </label>
      </section>

      <section class="card">
        <h2>调试</h2>
        <p class="hint">把前后端运行日志打包成一个文件，发给调试 AI 帮助定位问题。</p>
        <div class="actions">
          <button id="exportBtn" class="ghost">导出调试包</button>
          <button id="clearLogsBtn" class="ghost">清空日志</button>
        </div>
        <span id="debugResult" class="hint"></span>
      </section>

      <div class="actions">
        <button id="saveBtn">保存</button>
        <span id="saveResult" class="hint"></span>
      </div>
    </main>
    <script src="./options.ts" type="module"></script>
  </body>
</html>
